<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin SMPN 1 Damai</title>
    <style>
        * { box-sizing: border-box; }
        :root { --primary: #0ea5e9; --primary-hover: #0284c7; --danger: #ef4444; --text-main: #e2e8f0; --text-bold: #f8fafc; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text-main); 
               background: linear-gradient(135deg, #0f172a, #1e1b4b, #064e3b); background-attachment: fixed; 
               min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 30px 15px; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px 0 rgba(0, 0, 0, 0.5); border-radius: 24px; }
        #login-screen { text-align: center; padding: 40px; width: 100%; max-width: 350px; margin-top: 10vh; }
        #login-screen img { width: 100px; margin-bottom: 20px; }
        #dashboard-screen { display: none; width: 100%; max-width: 800px; padding: 35px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header img { height: 50px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);}
        .header h2 { margin: 0; font-size: 1.6rem; color: var(--text-bold); font-weight: 800; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px;}
        .tab-btn { padding: 10px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); font-weight: 700; cursor: pointer; background: rgba(255,255,255,0.05); color: var(--text-main); transition: all 0.3s; white-space: nowrap;}
        .tab-btn.active { background: rgba(255,255,255,0.15); color: #38bdf8; border-color: #38bdf8;}
        label { display: block; font-weight: 700; margin-bottom: 6px; color: #38bdf8; font-size: 0.95rem; margin-top: 15px;}
        input[type="text"], input[type="password"], input[type="date"], textarea, input[type="file"] { width: 100%; padding: 14px; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; border-radius: 12px; font-family: inherit; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);}
        textarea { height: 250px; resize: vertical; }
        input[readonly] { background-color: rgba(255,255,255,0.05); color: #94a3b8; cursor: not-allowed; border-style: dashed; }
        #old-image-container { display: none; background: rgba(0,0,0,0.3); padding: 12px 15px; border-radius: 12px; margin-bottom: 15px; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.2);}
        #old-image-name { font-size: 0.85rem; font-weight: 600; color: #cbd5e1; word-break: break-all; }
        
        .btn-container { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        button.btn-main { flex: 1; min-width: 200px; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.3s; }
        button.btn-main:hover { background: var(--primary-hover); }
        button.btn-cancel { flex: 1; min-width: 150px; padding: 14px; background: transparent; border: 2px solid var(--danger); color: var(--danger); border-radius: 50px; font-size: 1rem; font-weight: 800; cursor: pointer; transition: 0.3s; display: none; }
        button.btn-cancel:hover { background: var(--danger); color: white; }
        
        button.btn-logout { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 8px 18px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button.btn-logout:hover { background: var(--danger); color: white; }
        button.btn-hapus-foto { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; cursor: pointer;}
        .news-item { background: rgba(0,0,0,0.2); padding: 15px 20px; border-radius: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05);}
        .news-title { font-weight: 700; color: var(--text-bold); font-size: 1.05rem;}
        .action-btns button { padding: 8px 15px; border: none; border-radius: 20px; font-size: 0.85rem; cursor: pointer; margin-left: 8px; font-weight: bold;}
        .btn-edit { background: #3b82f6; color: white; }
        .btn-delete { background: var(--danger); color: white; }
        .loading { display: none; color: #38bdf8; font-weight: bold; text-align: center; margin-top: 15px; width: 100%; }
        
        @media (max-width: 600px) {
            .news-item { flex-direction: column; align-items: flex-start; gap: 10px;}
            .action-btns { align-self: flex-end; }
        }
    </style>
</head>
<body>

    <div id="login-screen" class="glass-card">
        <h2 style="margin-top:0; color: var(--text-bold); font-weight: 800;">Login CMS</h2>
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button onclick="doLogin()" id="btnLogin" class="btn-main" style="width: 100%;">Login</button>
        <div id="login-msg" class="loading"></div>
    </div>

    <div id="dashboard-screen" class="glass-card">
        <div class="header">
            <div class="header-left">
                <h2>Portal Admin</h2>
            </div>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" id="tab-tulis" onclick="switchTab('tulis')">✏️ Berita/Info</button>
            <button class="tab-btn" id="tab-daftar" onclick="switchTab('daftar')">📋 Daftar Publikasi</button>
        </div>

        <div id="area-tulis">
            <input type="hidden" id="edit-sha" value="">
            <input type="hidden" id="edit-path" value="">
            <input type="hidden" id="old-image-path" value="">
            <input type="hidden" id="delete-image-path" value="">
            
            <label>Penulis</label>
            <input type="text" id="author" readonly>
            
            <label>Tanggal Publikasi (Bisa diganti untuk arsip lama)</label>
            <input type="date" id="date" required>
            
            <label>Judul Berita</label>
            <input type="text" id="title" placeholder="Masukkan judul..." required>

            <label>Foto Dokumentasi (Opsional)</label>
            <div id="old-image-container">
                <span id="old-image-name">🖼️ Foto: ...</span>
                <button type="button" class="btn-hapus-foto" onclick="hapusFotoLama()">Hapus</button>
            </div>
            <input type="file" id="image" accept="image/*">

            <label>Isi Berita</label>
            <textarea id="body" placeholder="Tulis beritamu di sini..."></textarea>

            <div class="btn-container">
                <button onclick="batalEdit()" id="btnCancelEdit" class="btn-cancel">❌ Batal Edit</button>
                <button onclick="publish()" id="btnPublish" class="btn-main">🚀 Terbitkan Berita</button>
                <div id="publish-msg" class="loading"></div>
            </div>
        </div>

        <div id="area-daftar" style="display: none;">
            <div id="list-container" style="font-weight: 600; text-align: center;">Memuat data...</div>
        </div>

    </div>

    <script>
        window.onload = () => {
            if (sessionStorage.getItem('cms_user')) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard-screen').style.display = 'block';
                document.getElementById('author').value = sessionStorage.getItem('cms_author');
                resetForm(); 
            }
        };

        function switchTab(tab) {
            document.getElementById('tab-tulis').classList.remove('active');
            document.getElementById('tab-daftar').classList.remove('active');
            document.getElementById('area-tulis').style.display = 'none';
            document.getElementById('area-daftar').style.display = 'none';
            
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('area-' + tab).style.display = 'block';

            if(tab === 'daftar') loadList();
        }

        async function doLogin() {
            const u = document.getElementById('username').value, p = document.getElementById('password').value, btn = document.getElementById('btnLogin'), msg = document.getElementById('login-msg');
            if (!u || !p) return; btn.disabled = true; msg.style.display = 'block'; msg.innerText = "Memeriksa identitas...";
            
            try {
                const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
                const data = await res.json();
                if (data.success) {
                    sessionStorage.setItem('cms_user', u); sessionStorage.setItem('cms_pass', p); sessionStorage.setItem('cms_author', data.author);
                    document.getElementById('login-screen').style.display = 'none'; document.getElementById('dashboard-screen').style.display = 'block'; document.getElementById('author').value = data.author;
                    resetForm();
                } else { alert(data.error); }
            } catch (err) { alert("Gagal menyambung ke server."); }
            btn.disabled = false; msg.style.display = 'none';
        }

        function logout() { sessionStorage.clear(); location.reload(); }
        
        function resetForm() { 
            document.getElementById('title').value = ''; document.getElementById('body').value = ''; 
            document.getElementById('image').value = ''; document.getElementById('edit-sha').value = ''; 
            document.getElementById('edit-path').value = ''; document.getElementById('old-image-path').value = '';
            document.getElementById('delete-image-path').value = ''; document.getElementById('old-image-path').dataset.original = '';
            document.getElementById('old-image-container').style.display = 'none'; 
            
            document.getElementById('btnPublish').innerText = '🚀 Terbitkan Berita Baru'; 
            document.getElementById('btnCancelEdit').style.display = 'none';
            
            // Format wajib YYYY-MM-DD biar nggak error di kolom input kalender browser
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('date').value = `${yyyy}-${mm}-${dd}`;
        }

        function batalEdit() {
            if(confirm("Yakin ingin membatalkan proses edit dan menulis berita baru?")) {
                resetForm();
            }
        }

        function hapusFotoLama() {
            const oldPath = document.getElementById('old-image-path').value;
            if (oldPath) { document.getElementById('delete-image-path').value = oldPath; }
            document.getElementById('old-image-path').value = ''; 
            document.getElementById('old-image-container').style.display = 'none'; 
            alert("Foto siap dihapus saat berita disimpan.");
        }

        async function loadList() {
            const container = document.getElementById('list-container');
            container.innerHTML = 'Mencari arsip berita...';
            try {
                const res = await fetch('/api/list'); const data = await res.json();
                if(data.error) throw new Error(data.error);
                if(data.length === 0) return container.innerHTML = 'Belum ada berita yang dipublikasikan.';
                let html = '';
                data.filter(f => f.name.endsWith('.md')).reverse().forEach(file => {
                    html += `<div class="news-item"><div class="news-title">${file.name.replace('.md', '')}</div><div class="action-btns"><button class="btn-edit" onclick="editFile('${file.path}', '${file.sha}')">Edit</button><button class="btn-delete" onclick="deleteFile('${file.path}', '${file.sha}')">Hapus</button></div></div>`;
                });
                container.innerHTML = html;
            } catch(e) { container.innerHTML = 'Gagal memuat data.'; }
        }

        async function deleteFile(path, sha) {
            if(!confirm('Yakin hapus permanen?')) return;
            try {
                await fetch('/api/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: sessionStorage.getItem('cms_user'), password: sessionStorage.getItem('cms_pass'), path: path, sha: sha }) });
                alert('Berita sukses dihapus!'); loadList();
            } catch(e) { alert('Gagal menghapus'); }
        }

        async function editFile(path, sha) {
            document.getElementById('list-container').innerHTML = 'Menarik data...';
            try {
                const res = await fetch(`/api/detail?path=${encodeURIComponent(path)}`);
                const data = await res.json();
                const rawContent = decodeURIComponent(escape(window.atob(data.content)));
                
                const titleMatch = rawContent.match(/title:\s*"(.*?)"/);
                const title = titleMatch ? titleMatch[1] : path.replace('.md', '').split('/').pop();
                const body = rawContent.replace(/---[\s\S]*?---/, '').trim();
                const thumbMatch = rawContent.match(/thumbnail:\s*"(.*?)"/);
                const oldImage = (thumbMatch && thumbMatch[1] !== '') ? thumbMatch[1] : '';
                
                // Cek apakah berita jadul punya tanggal atau enggak. Kalau enggak, kasih tanggal hari ini.
                const dateMatch = rawContent.match(/date:\s*"(.*?)"/);
                let dateVal = '';
                if (dateMatch && dateMatch[1]) {
                    dateVal = dateMatch[1];
                } else {
                    const today = new Date();
                    const yyyy = today.getFullYear();
                    const mm = String(today.getMonth() + 1).padStart(2, '0');
                    const dd = String(today.getDate()).padStart(2, '0');
                    dateVal = `${yyyy}-${mm}-${dd}`;
                }

                document.getElementById('title').value = title; 
                document.getElementById('body').value = body;
                document.getElementById('date').value = dateVal;
                document.getElementById('edit-sha').value = sha; 
                document.getElementById('edit-path').value = path;
                
                document.getElementById('btnPublish').innerText = '💾 Simpan Perubahan';
                document.getElementById('btnCancelEdit').style.display = 'block'; // Tombol batal muncul
                
                const oldPathInput = document.getElementById('old-image-path'); const delPathInput = document.getElementById('delete-image-path');
                const oldImgContainer = document.getElementById('old-image-container'); const oldImgName = document.getElementById('old-image-name');
                oldPathInput.value = oldImage; oldPathInput.dataset.original = oldImage; delPathInput.value = ''; 
                
                if (oldImage) { oldImgContainer.style.display = 'flex'; oldImgName.innerText = '🖼️ Foto: ' + oldImage.split('/').pop(); } 
                else { oldImgContainer.style.display = 'none'; }
                
                switchTab('tulis'); loadList(); 
            } catch(e) { alert('Gagal memuat detail.'); loadList(); }
        }

        function compressImage(file, maxWidth = 1200, quality = 0.7) {
            return new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width; let height = img.height;
                        if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
                        const canvas = document.createElement('canvas'); canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                };
            });
        }

        async function publish() {
            const title = document.getElementById('title').value; 
            const body = document.getElementById('body').value;
            const date = document.getElementById('date').value;
            
            const imgFiles = document.getElementById('image').files; 
            const editSha = document.getElementById('edit-sha').value; const editPath = document.getElementById('edit-path').value;
            const oldImage = document.getElementById('old-image-path').value;
            let imageToDelete = document.getElementById('delete-image-path').value;
            const originalImage = document.getElementById('old-image-path').dataset.original;
            const msg = document.getElementById('publish-msg'); const btn = document.getElementById('btnPublish');
            
            if (!title || !body || !date) return alert("Judul, Tanggal, dan Isi wajib diisi!");
            btn.disabled = true; msg.style.display = 'block'; msg.innerText = "Memproses...";

            let imagesArray = []; 
            if (imgFiles.length > 0) {
                msg.innerText = `Mengompres foto...`;
                for (let i = 0; i < imgFiles.length; i++) {
                    const compressedBase64 = await compressImage(imgFiles[i], 1200, 0.7);
                    imagesArray.push({ base64: compressedBase64, name: imgFiles[i].name.split('.')[0] + '.jpg' });
                }
                if (originalImage) imageToDelete = originalImage;
            }

            msg.innerText = "Mengirim ke server...";
            
            const payload = { username: sessionStorage.getItem('cms_user'), password: sessionStorage.getItem('cms_pass'), title, body, date, images: imagesArray, updateSha: editSha, updatePath: editPath, oldImage: oldImage, imageToDelete: imageToDelete };
            
            try {
                const res = await fetch('/api/publish', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await res.json();
                if (data.success) { alert("✅ Berhasil!"); resetForm(); switchTab('daftar'); } 
                else { alert("Error Server: " + data.error); }
            } catch (err) { alert("Jaringan terputus."); }
            
            btn.disabled = false; msg.style.display = 'none';
        }
    </script>
</body>
</html>
