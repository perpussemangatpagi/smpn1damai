<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMPN 1 Damai - Sedang Dalam Pengerjaan</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            
            /* Animasi Latar Belakang Mesh Gradient */
            background-color: #f1f2f6;
            background-image: 
                radial-gradient(at 0% 0%, hsla(210,100%,80%,0.8) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(160,100%,80%,0.6) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(210,100%,80%,0.8) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(160,100%,80%,0.6) 0px, transparent 50%);
            background-size: 150% 150%;
            animation: gradientAnim 15s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #2c3e50;
            text-align: center;
        }

        @keyframes gradientAnim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            /* Efek Glassmorphism (Kaca Transparan) */
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            max-width: 500px;
            width: 85%;
            position: relative;
            z-index: 1;
        }

        .logo {
            max-width: 110px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #1e272e;
            font-weight: 700;
        }

        p {
            font-size: 15px;
            color: #485460;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .loader {
            margin: 20px auto;
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.4);
            border-top: 4px solid #0fb9b1; /* Aksen hijau toska/kebiruan */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .links {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.5);
        }

        .links p {
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: 600;
            color: #1e272e;
        }

        .btn-link {
            display: inline-block;
            margin: 5px 8px;
            padding: 10px 22px;
            background: rgba(255, 255, 255, 0.55);
            color: #0984e3; /* Aksen link biru */
            text-decoration: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .btn-link:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="llogo_sekolah (1).png" alt="Logo SMPN 1 Damai" class="logo">
        
        <h1>Website Sedang Dalam Pengembangan</h1>
        <p>Mohon maaf, situs utama <strong>smpn1damai.web.id</strong> saat ini sedang dalam proses pengerjaan dan pemeliharaan sistem.</p>
        
        <div class="loader"></div>
        
        <div class="links">
            <p>Silakan akses layanan yang sudah tersedia:</p>
            <a href="https://exambro.smpn1damai.web.id" class="btn-link">Exambro</a>
            <a href="https://perpus.smpn1damai.web.id" class="btn-link">Perpustakaan</a>
        </div>
    </div>

</body>
</html>
